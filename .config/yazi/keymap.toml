[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = "H"
run = "plugin duckdb -1"
desc = "duckdb: scroll one column left"

[[mgr.prepend_keymap]]
on = "L"
run = "plugin duckdb +1"
desc = "duckdb: scroll one column right"

[[mgr.prepend_keymap]]
on = ["g", "o"]
run = "plugin duckdb -open"
desc = "duckdb: open file in duckdb CLI"

[[mgr.prepend_keymap]]
on = ["g", "u"]
run = "plugin duckdb -ui"
desc = "duckdb: open file in duckdb UI"

[[mgr.prepend_keymap]]
on = "z"
run = "plugin zoxide"
desc = "jump via zoxide"

[[mgr.prepend_keymap]]
on = ["y", "y"]
run = "yank"
desc = "yank selected files"

[[mgr.prepend_keymap]]
on = ["y", "p"]
run = "copy path"
desc = "copy file path"

[[mgr.prepend_keymap]]
on = ["y", "d"]
run = "copy dirname"
desc = "copy directory path"

[[mgr.prepend_keymap]]
on = ["y", "f"]
run = "copy filename"
desc = "copy filename"

[[mgr.prepend_keymap]]
on = ["y", "n"]
run = "copy name_without_ext"
desc = "copy filename without extension"

[[mgr.prepend_keymap]]
on = ["y", "u"]
run = "unyank"
desc = "cancel yank status"
