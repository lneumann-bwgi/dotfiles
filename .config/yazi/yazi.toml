[mgr]
ratio = [1, 2, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true

[preview]
tab_size = 2
max_width = 1000
max_height = 1500
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
doc = [
	{ run = 'zathura "$@"', orphan = true, for = "unix" },
	{ run = 'com.github.johnfactotum.Foliate "$@"', orphan = true, for = "unix" },
]

[open]
prepend_rules = [
	{ url = "*.pdf", use = "doc" },
	{ url = "*.dvu", use = "doc" },
	{ url = "*.epub", use = "doc" },
	{ url = "*.azw3", use = "doc" },
	{ url = "*.mobi", use = "doc" },
]

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
