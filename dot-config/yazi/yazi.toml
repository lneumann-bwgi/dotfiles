[mgr]
ratio = [1, 2, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true

[preview]
tab_size = 2
max_width = 1000
max_height = 1500
cache_dir = ""
image_filter = "triangle"
image_quality = 90
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
doc = [
    { run = 'open "$@"', desc = "Open in default app", orphan = true, for = "macos" },
	{ run = 'zathura "$@"', orphan = true, for = "unix" },
	{ run = 'com.github.johnfactotum.Foliate "$@"', orphan = true, for = "unix" },
]
visidata = [
	{ run = 'uvx --with openpyxl --with pyarrow visidata "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
	{ url = "*.pdf", use = "doc" },
	{ url = "*.dvu", use = "doc" },
	{ url = "*.epub", use = "doc" },
	{ url = "*.azw3", use = "doc" },
	{ url = "*.mobi", use = "doc" },
	{ url = "*.csv", use = "visidata" },
	{ url = "*.tsv", use = "visidata" },
	{ url = "*.xlsx", use = "visidata" },
	{ url = "*.parquet", use = "visidata" },
]


[plugin]
prepend_previewers = [
  { url = "*.csv", run = "duckdb" },
  { url = "*.tsv", run = "duckdb" },
  { url = "*.json", run = "duckdb" },
  { url = "*.parquet", run = "duckdb" },
  { url = "*.txt", run = "duckdb" },
  { url = "*.xlsx", run = "duckdb" },
  { url = "*.db", run = "duckdb" },
  { url = "*.duckdb", run = "duckdb" },
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
  { url = "*/", run = 'piper -- eza -TL=3 --color=always --icons=always --group-directories-first --no-quotes "$1"' },
]

prepend_preloaders = [
  { url = "*.csv", run = "duckdb", multi = false },
  { url = "*.tsv", run = "duckdb", multi = false },
  { url = "*.json", run = "duckdb", multi = false },
  { url = "*.parquet", run = "duckdb", multi = false },
  { url = "*.txt", run = "duckdb", multi = false },
  { url = "*.xlsx", run = "duckdb", multi = false }
]

pretend_fetchers = [
  { url = "*", run = "git", group = "git" },
  { url = "*/", run = "git", group = "git" },
]
