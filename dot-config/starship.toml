# Starship prompt config
# Docs: https://starship.rs/config/

# --- Performance ---
command_timeout = 500   # ms; modules exceeding this show a warning
scan_timeout    = 30    # ms; per-dir file scan budget for language detection
add_newline     = true  # blank line between prompts

# --- Format (left prompt) ---
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$golang\
$aws\
$docker_context\
$direnv\
$jobs\
$fill\
$cmd_duration\
$line_break\
$character"""

# multi-line input, e.g. unclosed quote).
continuation_prompt = "[▶▶ ](grey)"

# --- Directory ---
[directory]
truncation_length     = 4
truncate_to_repo      = true
truncation_symbol     = ".../"
read_only             = " RO"
home_symbol           = "~"

# --- Command duration ---
[cmd_duration]
min_time           = 2000
format             = "took [$duration]($style) "
show_milliseconds  = false

# --- Character (prompt symbol) ---
[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](green)"

# --- Time (right prompt) ---
[time]
disabled    = false
format      = "[$time]($style)"
time_format = "%H:%M"

# --- Fill (pads $format so right side hits edge) ---
[fill]
symbol = "·"

# --- Whitelist policy ---
# Only modules listed in $format / $right_format render.
# All others = disabled to stop CWD scans (perf on network FS).

# --- Enabled language modules ---
[python]
disabled = false
[golang]
disabled = false
[nodejs]
disabled = false

# --- Enabled cloud/infra ---
[docker_context]
